<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="menu-lateral col-2">
            <h2 class="cherry-bomb-one-regular">MoneyLens</h2>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="transacao.html" class="active">Transações</a></li>
                <li><a href="relatorio.html">Relatório</a></li>
                <li><a href="configuracao.html">Configurações</a></li>
            </ul>
            <button class="sair"><a href="login.html">Sair</a></button>
        </div>
        <div id="conteudo-principal" class="col-10">
            <h1>Transações</h1>
            <div id="form-gastos">
                <form class="formulario-gasto">
                    <label for="descricao">Descrição:</label>
                    <input type="text" id="descricao" name="descricao" required />

                    <label for="valor">Valor:</label>
                    <input type="number" id="valor" name="valor" required />

                    <label for="parcela">Parcelas:</label>
                    <input type="number" id="parcela" name="parcela" min="1" />

                    <label for="data">Data:</label>
                    <input type="date" id="data" name="data" required /> <!-- Deixar data de hoje como padrão -->

                    <label for="categoria">Categoria:</label> <!--Lista gerada do BD, escolhas fixas e o cliente pode adicionar -->
                    <select id="categoria" name="categoria">
                        <option value="alimentacao">Alimentação</option>
                        <option value="transporte">Transporte</option>
                        <option value="lazer">Lazer</option>
                    </select>
                    <input type="submit" />
                </form>
            </div>
            </br>

            <div class="linha-pontilhada"></div>

            <div id="lista-gastos" class="extrato">
                <h2>Extrato da Semana</h2>

                <table>
                    <tbody>
                        <!-- Grupo: 17/05/2026 -->
                        <tr class="grupo-data">
                            <td colspan="4">
                                <span class="data">17/05/2026</span>
                                <span class="total-dia">R$ 200,00</span>
                            </td>
                        </tr>

                        <tr class="movimento">
                            <td>Supermercado</td>
                            <td>R$ 150,00</td>
                            <td>1x</td>
                            <td>Débito</td>
                        </tr>

                        <tr class="movimento">
                            <td>Transporte</td>
                            <td>R$ 50,00</td>
                            <td>1x</td>
                            <td>Pix</td>
                        </tr>

                        <!-- Grupo: 16/05/2026 -->
                        <tr class="grupo-data">
                            <td colspan="4">
                                <span class="data">16/05/2026</span>
                                <span class="total-dia">R$ 320,00</span>
                            </td>
                        </tr>

                        <tr class="movimento">
                            <td>Restaurante</td>
                            <td>R$ 120,00</td>
                            <td>1x</td>
                            <td>Crédito</td>
                        </tr>

                        <tr class="movimento">
                            <td>Farmácia</td>
                            <td>R$ 200,00</td>
                            <td>2x</td>
                            <td>Crédito</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
